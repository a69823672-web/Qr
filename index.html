<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه پرواز</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<img id="logo" class="logo">

<h1>کافه پرواز</h1>

<p>شرکت هوانوردی عقاب آسمان شمال</p>

</header>

<button class="adminBtn" onclick="openPanel()">
پنل مدیریت
</button>

<div id="panel" class="panel">

<h2>پنل مدیریت</h2>

<input
type="password"
id="pass"
placeholder=""
autocomplete="off">

<button onclick="login()">
ورود
</button>

<div id="adminArea" style="display:none;">

<input
type="text"
id="name"
placeholder="نام محصول">

<input
type="text"
id="price"
placeholder="قیمت">

<input
type="file"
id="img"
accept="image/*">

<button onclick="addItem()">
افزودن محصول
</button>

<button onclick="closePanel()">
بستن
</button>

</div>

</div>

<div id="menu" class="menu"></div>

<script src="script.js"></script>

</body>
</html>
