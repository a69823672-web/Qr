<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه پرواز</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>کافه پرواز</h1>
<p>شرکت هوانوردی عقاب آسمان شمال</p>

<div class="categories">
    <button onclick="filterMenu('همه')">همه</button>
    <button onclick="filterMenu('گرم')">نوشیدنی گرم بر پایه قهوه</button>
    <button onclick="filterMenu('سرد')">نوشیدنی سرد بر پایه قهوه</button>
    <button onclick="filterMenu('شرکتی')">نوشیدنی شرکتی</button>
    <button onclick="filterMenu('تنقلات')">تنقلات</button>
    <button onclick="filterMenu('سایر')">سایر</button>
</div>

</header>

<button class="adminBtn" onclick="openPanel()">
پنل مدیریت
</button>

<div id="panel" class="panel">

<h2>پنل مدیریت</h2>

<input
type="password"
id="pass"
placeholder=""
autocomplete="off">

<button onclick="login()">ورود</button>

<div id="adminArea" style="display:none;">

<input
type="text"
id="name"
placeholder="نام محصول">

<input
type="text"
id="price"
placeholder="قیمت">

<select id="category">
    <option value="گرم">نوشیدنی گرم بر پایه قهوه</option>
    <option value="سرد">نوشیدنی سرد بر پایه قهوه</option>
    <option value="شرکتی">نوشیدنی شرکتی</option>
    <option value="تنقلات">تنقلات</option>
    <option value="سایر">سایر</option>
</select>

<input
type="file"
id="img"
accept="image/*">

<button onclick="addItem()">
افزودن محصول
</button>

<button onclick="closePanel()">
بستن
</button>

</div>

</div>

<div id="menu" class="menu"></div>

<script src="script.js"></script>

</body>
</html>
